<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In / Sign Up</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
  <script src="auth.js" defer></script>
</head>
<body class="auth-page">

  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand">
        <h1>PersonaPlay</h1>
        <p>Sign in or create an account to continue.</p>
      </div>

      <div class="auth-tabs">
        <button id="signinTab" class="auth-tab active" type="button">Sign In</button>
        <button id="signupTab" class="auth-tab" type="button">Sign Up</button>
      </div>

      <form id="signinForm" class="auth-form">
        <label>Email</label>
        <input type="email" id="signinEmail" placeholder="Enter your email" required />

        <label>Password</label>
        <input type="password" id="signinPassword" placeholder="Enter your password" required />

        <button type="submit" class="auth-button">Sign In</button>
        <p class="auth-message" id="signinMessage"></p>
      </form>

      <form id="signupForm" class="auth-form hidden">
        <label>Name</label>
        <input type="text" id="signupName" placeholder="Enter your name" required />

        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="Enter your email" required />

        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Create a password" required />

        <button type="submit" class="auth-button">Sign Up</button>
        <p class="auth-message" id="signupMessage"></p>
      </form>

      <div class="auth-footer">
        <a href="index.html">Back to Home</a>
      </div>
    </section>
  </main>

</body>
</html>
